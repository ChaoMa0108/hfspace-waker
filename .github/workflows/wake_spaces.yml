name: Super Secure 3-Space Independent Random Wake Up

on:
  schedule:
    # 每天北京时间早上 8:00 叫醒 GitHub 脚本（作为一天的计时起点）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击测试

jobs:
  wake-up-task:
    runs-on: ubuntu-latest
    steps:
      - name: Independent Randomized Execution
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 为三个空间分别生成 0 到 18000 秒（0 到 5 小时）之间的独立随机总延迟
          DELAY_A=$(( RANDOM % 18001 ))
          DELAY_B=$(( RANDOM % 18001 ))
          DELAY_C=$(( RANDOM % 18001 ))
          
          echo "========================================="
          echo "📊 今日独创随机排期表（从北京时间早上 8:00 起算）："
          echo "Spleeter 空间将在 $DELAY_A 秒后唤醒 (约 $(echo "scale=2; $DELAY_A/3600" | bc) 小时)"
          echo "Mynew    空间将在 $DELAY_B 秒后唤醒 (约 $(echo "scale=2; $DELAY_B/3600" | bc) 小时)"
          echo "Ausep     空间将在 $DELAY_C 秒后唤醒 (约 $(echo "scale=2; $DELAY_C/3600" | bc) 小时)"
          echo "========================================="
          
          # 2. 将空间地址和它们对应的绝对延迟时间放入临时列表，并按时间从小到大排序
          # 这样能确保谁的随机时间短，谁就先执行，不会漏掉任何一个
          SPACE_A="https://chaoma0108-spleeter.hf.space"
          SPACE_B="https://chaoma0108-mynew.hf.space"
          SPACE_C="https://chaoma0108-Ausep.hf.space"
          
          # 格式：绝对秒数|空间名字|URL
          (
            echo "$DELAY_A|Spleeter|$SPACE_A"
            echo "$DELAY_B|Mynew|$SPACE_B"
            echo "$DELAY_C|Test|$SPACE_C"
          ) | sort -n > schedule.txt
          
          # 3. 定义一个分段睡眠保活函数，防止 GitHub 误杀卡死的任务
          safe_sleep() {
            local seconds=$1
            local remaining=$seconds
            while [ $remaining -gt 1800 ]; do
              echo "💤 正在静默等待中，本阶段还剩 $remaining 秒..."
              sleep 1800
              remaining=$(( remaining - 1800 ))
            done
            if [ $remaining -gt 0 ]; then
              sleep $remaining
            fi
          }
          
          # 4. 依次执行排期任务
          CURRENT_TIME=0
          while IFS='|' read -r target_time space_name space_url; do
            # 计算当前需要睡眠的相对差值
            SLEEP_DURATION=$(( target_time - CURRENT_TIME ))
            
            if [ $SLEEP_DURATION -gt 0 ]; then
              echo ""
              echo "⏳ [排期规划] 距离唤醒 [$space_name] 还需要等待 $SLEEP_DURATION 秒..."
              safe_sleep $SLEEP_DURATION
            fi
            
            echo "🚀 [执行唤醒] 正在请求 $space_name 空间..."
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" $space_url)
            echo "👉 $space_name 返回状态码: $CODE"
            
            # 更新当前已过去的时间锚点
            CURRENT_TIME=$target_time
          done < schedule.txt
          
          echo ""
          echo "========================================="
          echo "🎉 今日 3 个空间各自独立的随机唤醒任务圆满结束！"
          echo "========================================="
